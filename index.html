<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏆 Álbum de Figurinhas Copa 2026</title>

  <!-- Styles -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/grid.css">

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-content">
      <div class="header-title">
        <h1>🏆 Álbum 2026</h1>
        <p class="header-stats">
          <span id="totalStats">450 / 980</span>
          <span id="percentStats">(45%)</span>
        </p>
      </div>
      <button class="menu-btn" id="menuBtn">☰</button>
    </div>

    <!-- Progress bar -->
    <div class="progress-container">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 45%"></div>
      </div>
    </div>
  </header>

  <!-- Group tabs -->
  <nav class="group-tabs" id="groupTabs"></nav>

  <!-- Main content -->
  <main class="container">
    <div class="group-content" id="groupContent"></div>
  </main>

  <!-- Menu (hidden by default) -->
  <div class="menu-overlay" id="menuOverlay">
    <div class="menu-panel">
      <button class="menu-close" id="menuClose">×</button>
      <h2>Menu</h2>
      <ul>
        <li><a href="#" id="dashboardLink">📊 Dashboard</a></li>
        <li><a href="#" id="duplicatasLink">🔴 Duplicatas</a></li>
        <li><a href="#" id="settingsLink">⚙️ Configurações</a></li>
      </ul>
    </div>
  </div>

  <!-- Modal: Adicionar Duplicata -->
  <div class="modal-overlay" id="dupModalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2>➕ Adicionar Duplicata</h2>
        <button class="modal-close" id="dupModalClose">×</button>
      </div>
      <div class="modal-body">
        <input type="text" id="dupModalInput" placeholder="Digite o código (ex: BRA1)" autofocus>
        <div id="dupSuggestions" class="dup-suggestions"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-primary" id="dupModalOk">OK</button>
        <button class="btn-secondary" id="dupModalCancel">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/supabase.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/handlers.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
