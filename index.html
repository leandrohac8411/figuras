<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏆 Álbum de Figurinhas Copa 2026</title>

  <!-- Styles -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/grid.css">

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-content">
      <div class="header-title">
        <h1>🏆 Álbum 2026</h1>
        <p class="header-stats">
          <span id="totalStats">450 / 980</span>
          <span id="percentStats">(45%)</span>
        </p>
      </div>
      <button class="menu-btn" id="menuBtn">☰</button>
    </div>

    <!-- Progress bar -->
    <div class="progress-container">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 45%"></div>
      </div>
    </div>
  </header>

  <!-- Group tabs -->
  <nav class="group-tabs" id="groupTabs"></nav>

  <!-- Main content -->
  <main class="container">
    <div class="group-content" id="groupContent"></div>
  </main>

  <!-- Menu (hidden by default) -->
  <div class="menu-overlay" id="menuOverlay">
    <div class="menu-panel">
      <button class="menu-close" id="menuClose">×</button>
      <h2>Menu</h2>
      <ul>
        <li><a href="#" id="dashboardLink">📊 Dashboard</a></li>
        <li><a href="#" id="duplicatasLink">🔴 Duplicatas</a></li>
        <li><a href="#" id="settingsLink">⚙️ Configurações</a></li>
      </ul>
    </div>
  </div>

  <!-- Modal: Adicionar Duplicata -->
  <div class="modal-overlay" id="dupModalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2>➕ Adicionar Duplicata</h2>
        <button class="modal-close" id="dupModalClose">×</button>
      </div>
      <div class="modal-body">
        <input type="text" id="dupModalInput" placeholder="Digite o código (ex: BRA1)" autofocus>
        <div id="dupSuggestions" class="dup-suggestions"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-primary" id="dupModalOk">OK</button>
        <button class="btn-secondary" id="dupModalCancel">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- Modal: Dashboard -->
  <div class="modal-overlay" id="dashboardModalOverlay">
    <div class="modal modal-lg">
      <div class="modal-header">
        <h2>📊 Dashboard</h2>
        <button class="modal-close" id="dashboardModalClose">×</button>
      </div>
      <div class="modal-body" id="dashboardModalContent">
        <!-- Será preenchido dinamicamente -->
      </div>
      <div class="modal-footer">
        <button class="btn-primary" id="dashboardModalOk">Fechar</button>
      </div>
    </div>
  </div>

  <!-- Modal: Duplicatas -->
  <div class="modal-overlay" id="duplicatasModalOverlay">
    <div class="modal modal-lg">
      <div class="modal-header">
        <h2>🔴 Figurinhas Duplicadas</h2>
        <button class="modal-close" id="duplicatasModalClose">×</button>
      </div>
      <div class="modal-body" id="duplicatasModalContent">
        <!-- Será preenchido dinamicamente -->
      </div>
      <div class="modal-footer">
        <button class="btn-primary" id="duplicatasModalOk">Fechar</button>
      </div>
    </div>
  </div>

  <!-- Modal: Scan Figurinhas -->
  <div class="modal-overlay" id="scanModalOverlay">
    <div class="modal modal-lg">
      <div class="modal-header">
        <h2>📸 Scanear Figurinhas</h2>
        <button class="modal-close" id="scanModalClose">×</button>
      </div>
      <div class="modal-body">
        <div class="scan-options">
          <button class="btn-primary" id="scanCameraBtn">📷 Tirar Foto</button>
          <button class="btn-secondary" id="scanUploadBtn">📁 Fazer Upload</button>
        </div>
        <input type="file" id="scanFileInput" accept="image/*" style="display: none;">
        <input type="file" id="scanCameraInput" accept="image/*" capture="environment" style="display: none;">
        <div id="scanPreview" style="display: none; margin-top: 20px; text-align: center;">
          <img id="scanPreviewImg" style="max-width: 100%; max-height: 300px; border-radius: 8px;">
        </div>
        <button class="btn-primary" id="scanProcessBtn" style="display: none; margin-top: 15px; width: 100%;">Processar Foto</button>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="scanModalCancel">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- Modal: Result -->
  <div class="modal-overlay" id="resultModalOverlay">
    <div class="modal modal-lg">
      <div class="modal-header">
        <h2>✅ Resultado do Scan</h2>
        <button class="modal-close" id="resultModalClose">×</button>
      </div>
      <div class="modal-body" id="resultModalContent">
        <!-- Será preenchido dinamicamente -->
      </div>
      <div class="modal-footer">
        <button class="btn-primary" id="resultModalOk">Confirmar e Fechar</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/supabase.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/handlers.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
